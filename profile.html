<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ WC2026 Pronos — Mon profil</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page-content">
    <section class="profile-card" aria-label="Mon profil">
      <h1 class="profile-title">👤 Mon profil</h1>
      <p class="profile-subtitle">Choisis un avatar et écris une petite description.</p>

      <div class="profile-section">
        <h2 class="profile-section-title">Avatar</h2>
        <div class="avatar-grid" id="avatar-grid"></div>
      </div>

      <div class="profile-section">
        <label class="profile-section-title" for="profile-description">Ma description</label>
        <textarea
          id="profile-description"
          class="profile-textarea"
          maxlength="180"
          placeholder="Ex: Passionné de foot, fan des surprises en phase finale ⚽"
        ></textarea>
        <div class="profile-counter"><span id="profile-char-count">0</span>/180 caractères</div>
      </div>

      <div class="profile-actions">
        <button class="btn btn-primary" id="save-profile-btn">
          <i class="fas fa-save"></i> Enregistrer mon profil
        </button>
      </div>
      <p class="profile-feedback" id="profile-feedback"></p>
    </section>
  </main>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js" onerror="/* Firebase not configured — using localStorage */"></script>

  <script src="app.js"></script>
  <script>
    let currentUser = null;
    let selectedAvatar = null;

    async function initProfilePage() {
      currentUser = requireAuth();
      if (!currentUser) return;

      renderNavbar('profile');
      await loadAllData();

      const refreshedUser = getCurrentUser();
      if (refreshedUser) currentUser = refreshedUser;

      setupAvatarSelector();
      setupDescriptionField();
      setupSaveButton();
      renderProfileForm();
    }

    function setupAvatarSelector() {
      const avatarGrid = document.getElementById('avatar-grid');
      avatarGrid.innerHTML = getProfileAvatars().map(avatar => `
        <button
          type="button"
          class="avatar-option"
          data-avatar="${escapeHtml(avatar)}"
          aria-label="Choisir l'avatar ${escapeHtml(avatar)}"
        >
          ${escapeHtml(avatar)}
        </button>
      `).join('');

      avatarGrid.addEventListener('click', e => {
        const btn = e.target.closest('.avatar-option');
        if (!btn) return;
        selectedAvatar = btn.dataset.avatar;
        renderAvatarSelection();
      });
    }

    function setupDescriptionField() {
      const textarea = document.getElementById('profile-description');
      const counter = document.getElementById('profile-char-count');
      textarea.addEventListener('input', () => {
        counter.textContent = textarea.value.length;
      });
    }

    function setupSaveButton() {
      document.getElementById('save-profile-btn').addEventListener('click', () => {
        const textarea = document.getElementById('profile-description');
        const feedback = document.getElementById('profile-feedback');

        const result = updateUserProfile(currentUser.id, {
          avatar: selectedAvatar,
          description: textarea.value
        });

        if (!result.success) {
          feedback.style.color = 'var(--color-error)';
          feedback.textContent = `⚠️ ${result.error}`;
          return;
        }

        currentUser = result.user;
        renderNavbar('profile');
        feedback.style.color = 'var(--color-success)';
        feedback.textContent = '✅ Profil mis à jour !';
        showToast('Profil enregistré !', 'success');
      });
    }

    function renderProfileForm() {
      const textarea = document.getElementById('profile-description');
      const counter = document.getElementById('profile-char-count');

      selectedAvatar = currentUser.avatar;
      textarea.value = currentUser.description || '';
      counter.textContent = textarea.value.length;
      renderAvatarSelection();
    }

    function renderAvatarSelection() {
      document.querySelectorAll('.avatar-option').forEach(btn => {
        const isSelected = btn.dataset.avatar === selectedAvatar;
        btn.classList.toggle('active', isSelected);
        btn.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
      });
    }

    initProfilePage();
  </script>
</body>
</html>
