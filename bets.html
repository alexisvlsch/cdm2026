<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ WC2026 Pronos — Matchs</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Navbar -->
  <header id="navbar"></header>

  <!-- Main content -->
  <main class="page-content">
    <div class="bets-header">
      <h1 class="bets-title">🏟️ Les Matchs</h1>
      <div class="data-note" id="storage-note">
        <i class="fas fa-info-circle"></i>
        <span id="storage-note-text">Données sauvegardées localement dans ton navigateur.</span>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div>
        <div class="filter-label">Filtrer par groupe / phase</div>
        <div class="filter-buttons" id="stage-filters"></div>
      </div>
      <div class="filter-row">
        <div>
          <div class="filter-label">Trier</div>
          <div class="sort-toggle">
            <button class="sort-btn active" data-sort="date">📅 Par date</button>
            <button class="sort-btn" data-sort="unbet">🎯 Non pariés</button>
          </div>
        </div>
        <div style="flex:1">
          <div class="filter-label">Rechercher une équipe</div>
          <input
            type="search"
            class="search-input"
            id="search-input"
            placeholder="🔍 Brésil, France..."
            aria-label="Rechercher une équipe"
          />
        </div>
      </div>
    </div>

    <!-- Matches grid -->
    <div class="matches-grid" id="matches-grid">
      <div class="loading">
        <div class="spinner"></div>
        <span>Chargement des matchs...</span>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <!-- Firebase SDK (loaded unconditionally; initFirebase() handles the case where config is absent) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <!-- Optional: firebase-config.js sets window.__FIREBASE_CONFIG__ (gitignored, see firebase-config.example.js) -->
  <script src="firebase-config.js" onerror="/* Firebase not configured — using localStorage */"></script>

  <script src="app.js"></script>
  <script>
    // === BETS PAGE LOGIC ===

    let allMatches = [];
    let allBets = [];
    let currentUser = null;
    let activeStageFilter = 'all';
    let activeSort = 'date';
    let searchQuery = '';

    /**
     * Initialize the bets page.
     */
    async function initBetsPage() {
      currentUser = requireAuth();
      if (!currentUser) return;

      renderNavbar('bets');

      const noteEl = document.getElementById('storage-note-text');
      if (noteEl) {
        noteEl.textContent = isFirebaseActive()
          ? 'Base de données partagée active — tes paris sont visibles par tous. 🌐'
          : 'Données sauvegardées localement dans ton navigateur.';
      }

      const data = await loadAllData();
      allMatches = data.matches;
      allBets = data.bets;

      buildStageFilters();
      renderMatches();
      setupFilters();
    }

    /**
     * Build stage filter buttons from available match stages.
     */
    function buildStageFilters() {
      const container = document.getElementById('stage-filters');
      const stages = new Set();
      const groups = new Set();

      for (const m of allMatches) {
        if (m.group) {
          groups.add(m.group);
        } else {
          stages.add(m.stage);
        }
      }

      const filters = [
        { key: 'all', label: 'Tous' },
        ...Array.from(groups).sort().map(g => ({ key: `group-${g}`, label: `Groupe ${g}` })),
        ...Array.from(stages).map(s => ({ key: `stage-${s}`, label: s })),
      ];

      container.innerHTML = filters.map(f => `
        <button class="filter-btn ${f.key === 'all' ? 'active' : ''}" data-filter="${escapeHtml(f.key)}">
          ${escapeHtml(f.label)}
        </button>
      `).join('');

      container.addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeStageFilter = btn.dataset.filter;
        renderMatches();
      });
    }

    /**
     * Set up search and sort event listeners.
     */
    function setupFilters() {
      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value.trim().toLowerCase();
        renderMatches();
      });

      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeSort = btn.dataset.sort;
          renderMatches();
        });
      });
    }

    /**
     * Filter and sort matches based on current filter state.
     * @returns {Array} Filtered and sorted match array
     */
    function getFilteredMatches() {
      let matches = allMatches.filter(m => {
        // Stage/group filter
        if (activeStageFilter !== 'all') {
          if (activeStageFilter.startsWith('group-')) {
            const g = activeStageFilter.replace('group-', '');
            if (m.group !== g) return false;
          } else {
            const s = activeStageFilter.replace('stage-', '');
            if (m.stage !== s) return false;
          }
        }
        // Search filter
        if (searchQuery) {
          const text = (m.teamA + ' ' + m.teamB).toLowerCase();
          if (!text.includes(searchQuery)) return false;
        }
        return true;
      });

      // Sort
      if (activeSort === 'date') {
        matches = matches.sort((a, b) => new Date(a.date) - new Date(b.date));
      } else if (activeSort === 'unbet') {
        matches = matches.sort((a, b) => {
          const aBet = getUserBet(currentUser.id, a.id) !== null ? 1 : 0;
          const bBet = getUserBet(currentUser.id, b.id) !== null ? 1 : 0;
          if (aBet !== bBet) return aBet - bBet;
          return new Date(a.date) - new Date(b.date);
        });
      }

      return matches;
    }

    /**
     * Render the matches grid with cards.
     */
    function renderMatches() {
      const grid = document.getElementById('matches-grid');
      const matches = getFilteredMatches();

      if (matches.length === 0) {
        grid.innerHTML = '<div class="no-matches">😕 Aucun match trouvé pour ce filtre.</div>';
        return;
      }

      grid.innerHTML = matches.map(match => renderMatchCard(match)).join('');

      // Attach bet button listeners (simple bets)
      grid.querySelectorAll('.bet-btn').forEach(btn => {
        if (!btn.disabled) {
          btn.addEventListener('click', () => handleBetClick(btn));
        }
      });

      // Attach bet-type tab listeners
      grid.querySelectorAll('.bet-type-tab').forEach(tab => {
        tab.addEventListener('click', () => handleBetTypeTabClick(tab));
      });

      // Attach exact score submit button listeners
      grid.querySelectorAll('.btn-exact-submit').forEach(btn => {
        btn.addEventListener('click', () => handleExactScoreSubmit(btn));
      });

      // Attach prolongations bonus picker listeners
      grid.querySelectorAll('.bet-bonus-btn').forEach(btn => {
        btn.addEventListener('click', () => handleEtPredictionClick(btn));
      });

      // Attach score stepper button listeners
      grid.querySelectorAll('.score-stepper-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          adjustScoreInput(btn.dataset.target, parseInt(btn.dataset.dir, 10));
        });
      });
    }

    /**
     * Render a single match card HTML string.
     * @param {Object} match - Match object
     * @returns {string} HTML string for the card
     */
    function renderMatchCard(match) {
      const locked = isBetLocked(match);
      const userBet = getUserBet(currentUser.id, match.id);
      const hasResult = match.result != null;

      const betSectionHtml = renderBetSection(match, locked, userBet, hasResult);

      return `
        <article class="match-card" data-match-id="${escapeHtml(match.id)}">
          <div class="match-card-header">
            <span class="stage-badge">${escapeHtml(match.stage)}${match.group ? ' ' + escapeHtml(match.group) : ''}</span>
            <span class="match-date">📅 ${escapeHtml(formatDate(match.date))}</span>
          </div>
          <div class="match-body">
            <div class="match-teams">
              <div class="team">
                <span class="team-flag" aria-hidden="true">${match.flagA}</span>
                <span class="team-name">${escapeHtml(match.teamA)}</span>
              </div>
              <div class="vs-label">VS</div>
              <div class="team team-right">
                <span class="team-flag" aria-hidden="true">${match.flagB}</span>
                <span class="team-name">${escapeHtml(match.teamB)}</span>
              </div>
            </div>
            <div class="match-venue">📍 ${escapeHtml(match.venue || '')}</div>
            ${betSectionHtml}
          </div>
        </article>
      `;
    }

    /**
     * Render the bet section for a match card.
     * @param {Object} match - Match object
     * @param {boolean} locked - Whether betting is locked
     * @param {Object|null} userBet - The user's existing bet or null
     * @param {boolean} hasResult - Whether the match has a result
     * @returns {string} HTML string for the bet section
     */
    function renderBetSection(match, locked, userBet, hasResult) {
      let statusHtml = '';
      let buttonsDisabled = '';

      const teamALabel = `🏆 ${escapeHtml(match.teamA)} gagne`;
      const drawLabel = '🤝 Match nul';
      const teamBLabel = `🏆 ${escapeHtml(match.teamB)} gagne`;

      const getClass = (prediction) => {
        let cls = 'bet-btn';
        // Pour un pari exact, on derive la prediction implicite depuis le score
        const exactPrediction = (userBet && userBet.betType === 'exact')
          ? (userBet.scoreA > userBet.scoreB ? 'teamA' : userBet.scoreA < userBet.scoreB ? 'teamB' : 'draw')
          : null;
        const effectivePrediction = exactPrediction ?? (userBet ? userBet.prediction : null);
        if (!locked) {
          // Panneau simple uniquement : on surligne le bouton selectionne
          if (userBet && userBet.betType !== 'exact' && userBet.prediction === prediction) cls += ' selected';
        } else {
          if (hasResult) {
            if (prediction === match.result) cls += ' correct';
            else if (userBet && effectivePrediction === prediction && effectivePrediction !== match.result) cls += ' wrong';
            else cls += ' faded';
          } else {
            if (userBet && userBet.betType !== 'exact' && userBet.prediction === prediction) cls += ' selected';
          }
        }
        return cls;
      };

      if (locked) buttonsDisabled = 'disabled';

      // === Bonus prolongations (matchs a elimination directe uniquement) ===
      // Si le pari (simple ou score exact) predit un match nul, on propose de
      // deviner le vainqueur des prolongations / tirs au but pour +1 pt bonus.
      let etBonusHtml = '';
      if (isKnockoutStage(match) && userBet) {
        const predictsDraw = (userBet.betType === 'exact')
          ? userBet.scoreA === userBet.scoreB
          : userBet.prediction === 'draw';

        if (predictsDraw) {
          if (match.result === 'draw') {
            if (match.etWinner == null) {
              etBonusHtml = `<div class="bet-bonus-status">⏳ Vainqueur des prolongations pas encore renseigné.</div>`;
            } else if (userBet.etPrediction == null) {
              etBonusHtml = `<div class="bet-bonus-status">🎁 Bonus non joué (tu n'avais pas choisi de vainqueur).</div>`;
            } else if (userBet.etPrediction === match.etWinner) {
              etBonusHtml = `<div class="bet-bonus-status bonus-correct">🎁 Bonus prolongations réussi ! <span class="result-badge correct">+1 pt 🌟</span></div>`;
            } else {
              const etWinnerName = userBet.etPrediction === match.etWinner ? '' : (match.etWinner === 'teamA' ? match.teamA : match.teamB);
              etBonusHtml = `<div class="bet-bonus-status bonus-wrong">🎁 Bonus raté. Vainqueur prolongations : <strong>${escapeHtml(etWinnerName)}</strong></div>`;
            }
          } else if (!locked) {
            const etA = userBet.etPrediction === 'teamA' ? ' selected' : '';
            const etB = userBet.etPrediction === 'teamB' ? ' selected' : '';
            etBonusHtml = `
              <div class="bet-bonus-picker">
                <div class="bet-bonus-label">🎁 Bonus +1 pt si égalité : qui gagne aux prolongations / tirs au but ?</div>
                <div class="bet-bonus-buttons">
                  <button type="button" class="bet-bonus-btn${etA}" data-match-id="${escapeHtml(match.id)}" data-et-prediction="teamA">${match.flagA} ${escapeHtml(match.teamA)}</button>
                  <button type="button" class="bet-bonus-btn${etB}" data-match-id="${escapeHtml(match.id)}" data-et-prediction="teamB">${match.flagB} ${escapeHtml(match.teamB)}</button>
                </div>
              </div>
            `;
          }
        }
      }

      if (hasResult && userBet) {
        if (userBet.betType === 'exact') {
          const localIsCorrect = userBet.prediction === match.result;
          const localIsExactScore = localIsCorrect && match.resultScoreA != null && match.resultScoreB != null && userBet.scoreA === match.resultScoreA && userBet.scoreB === match.resultScoreB;
          if (localIsExactScore) {
            statusHtml = `<div class="bet-status correct">🎯 Score exact ! <span class="result-badge correct">+5 pts 🌟</span></div>`;
          } else if (localIsCorrect) {
            statusHtml = `<div class="bet-status correct">✅ Bonne équipe ! <span class="result-badge correct">+1 pt 🎉</span></div>`;
          } else {
            statusHtml = `<div class="bet-status wrong">❌ Raté ! Tu avais parié : <strong>${getPredictionLabel(userBet, match)}</strong> · Résultat : <strong>${getResultLabel(match)}</strong></div>`;
          }
        } else {
          const isCorrect = userBet.prediction === match.result;
          if (isCorrect) {
            statusHtml = `<div class="bet-status correct">✅ Bonne réponse ! <span class="result-badge correct">+2 pts 🎉</span></div>`;
          } else {
            statusHtml = `<div class="bet-status wrong">❌ Raté ! Tu avais parié : <strong>${getPredictionLabel(userBet, match)}</strong> · Résultat : <strong>${getResultLabel(match)}</strong></div>`;
          }
        }
      } else if (hasResult && !userBet) {
        statusHtml = `<div class="bet-status no-bet">😬 Tu n'as pas parié sur ce match.</div>`;
      } else if (locked && !userBet) {
        statusHtml = `<div class="bet-status locked">🔒 Paris fermés. Tu n'as pas parié sur ce match.</div>`;
      } else if (locked && userBet) {
        if (userBet.betType === 'exact') {
          statusHtml = `<div class="bet-status locked">🔒 Pari score exact verrouillé : <strong>${userBet.scoreA} – ${userBet.scoreB}</strong></div>`;
        } else {
          statusHtml = `<div class="bet-status locked">🔒 Pari verrouillé.</div>`;
        }
      } else if (userBet) {
        if (userBet.betType === 'exact') {
          statusHtml = `<div class="bet-status saved">✓ Score exact enregistré : <strong>${userBet.scoreA} – ${userBet.scoreB}</strong></div>`;
        } else {
          statusHtml = `<div class="bet-status saved">✓ Pari enregistré</div>`;
        }
      }

      // Determine active bet type tab for this match
      const currentBetType = (userBet && userBet.betType === 'exact') ? 'exact' : 'simple';
      const matchId = escapeHtml(match.id);

      // Exact score section — show current values if bet exists
      const savedScoreA = (userBet && userBet.betType === 'exact') ? userBet.scoreA : '';
      const savedScoreB = (userBet && userBet.betType === 'exact') ? userBet.scoreB : '';

      if (locked) {
        // Locked: no tabs, just show the relevant buttons (read-only)
        return `
          <div class="bet-section">
            <div class="bet-buttons">
              <button class="${getClass('teamA')}" disabled
                data-match-id="${matchId}" data-prediction="teamA">
                ${teamALabel}
              </button>
              <button class="${getClass('draw')}" disabled
                data-match-id="${matchId}" data-prediction="draw">
                ${drawLabel}
              </button>
              <button class="${getClass('teamB')}" disabled
                data-match-id="${matchId}" data-prediction="teamB">
                ${teamBLabel}
              </button>
            </div>
            ${etBonusHtml}
            ${statusHtml}
          </div>
        `;
      }

      return `
        <div class="bet-section">
          <div class="bet-type-tabs" data-match-id="${matchId}">
            <button class="bet-type-tab ${currentBetType === 'simple' ? 'active' : ''}"
              data-tab="simple" data-match-id="${matchId}">🎯 Résultat simple <span class="pts-badge">+2 pts</span></button>
            <button class="bet-type-tab ${currentBetType === 'exact' ? 'active' : ''}"
              data-tab="exact" data-match-id="${matchId}">⚽ Score exact <span class="pts-badge pts-exact">+5 pts</span></button>
          </div>
          <div class="bet-panel bet-panel-simple ${currentBetType === 'simple' ? 'active' : ''}">
            <div class="bet-buttons">
              <button class="${getClass('teamA')}"
                data-match-id="${matchId}" data-prediction="teamA">
                ${teamALabel}
              </button>
              <button class="${getClass('draw')}"
                data-match-id="${matchId}" data-prediction="draw">
                ${drawLabel}
              </button>
              <button class="${getClass('teamB')}"
                data-match-id="${matchId}" data-prediction="teamB">
                ${teamBLabel}
              </button>
            </div>
          </div>
          <div class="bet-panel bet-panel-exact ${currentBetType === 'exact' ? 'active' : ''}">
            <div class="exact-score-row">
              <div class="exact-score-team">
                <span class="exact-team-flag">${match.flagA}</span>
                <span class="exact-team-name">${escapeHtml(match.teamA)}</span>
                <div class="score-stepper">
                  <button type="button" class="score-stepper-btn" data-target="scoreA-${matchId}" data-dir="-1" aria-label="Diminuer le score ${escapeHtml(match.teamA)}">−</button>
                  <input type="number" class="score-input" min="0" max="99"
                    id="scoreA-${matchId}" value="${savedScoreA}"
                    placeholder="0" aria-label="Score ${escapeHtml(match.teamA)}" />
                  <button type="button" class="score-stepper-btn" data-target="scoreA-${matchId}" data-dir="1" aria-label="Augmenter le score ${escapeHtml(match.teamA)}">+</button>
                </div>
              </div>
              <span class="exact-separator">–</span>
              <div class="exact-score-team">
                <span class="exact-team-flag">${match.flagB}</span>
                <span class="exact-team-name">${escapeHtml(match.teamB)}</span>
                <div class="score-stepper">
                  <button type="button" class="score-stepper-btn" data-target="scoreB-${matchId}" data-dir="-1" aria-label="Diminuer le score ${escapeHtml(match.teamB)}">−</button>
                  <input type="number" class="score-input" min="0" max="99"
                    id="scoreB-${matchId}" value="${savedScoreB}"
                    placeholder="0" aria-label="Score ${escapeHtml(match.teamB)}" />
                  <button type="button" class="score-stepper-btn" data-target="scoreB-${matchId}" data-dir="1" aria-label="Augmenter le score ${escapeHtml(match.teamB)}">+</button>
                </div>
              </div>
            </div>
            <button class="btn btn-primary btn-exact-submit" data-match-id="${matchId}">
              Valider le score exact
            </button>
          </div>
          ${etBonusHtml}
          ${statusHtml}
        </div>
      `;
    }

    /**
     * Get a human-readable label for a match result.
     * @param {Object} match - Match object with result set
     * @returns {string} Result label
     */
    function getResultLabel(match) {
      if (match.result === 'teamA') return escapeHtml(match.teamA) + ' gagne';
      if (match.result === 'teamB') return escapeHtml(match.teamB) + ' gagne';
      return 'Match nul';
    }

    function getPredictionLabel(userBet, match) {
      if (userBet.betType === 'exact') {
        return escapeHtml(match.teamA) + ' ' + userBet.scoreA + ' – ' + userBet.scoreB + ' ' + escapeHtml(match.teamB);
      }
      if (userBet.prediction === 'teamA') return escapeHtml(match.teamA) + ' gagne';
      if (userBet.prediction === 'teamB') return escapeHtml(match.teamB) + ' gagne';
      return 'Match nul';
    }

    /**
     * Handle a bet type tab click (switch between simple and exact modes).
     * @param {HTMLElement} tab - The clicked tab button
     */
    function handleBetTypeTabClick(tab) {
      const matchId = tab.dataset.matchId;
      const tabType = tab.dataset.tab;

      const section = tab.closest('.bet-section');
      if (!section) return;

      // Update active tab
      section.querySelectorAll('.bet-type-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      // Show/hide panels
      section.querySelectorAll('.bet-panel').forEach(p => p.classList.remove('active'));
      section.querySelector(`.bet-panel-${tabType}`).classList.add('active');

      // If switching to simple and user currently has an exact bet, keep it visible but allow changing
    }

    /**
     * Handle exact score form submission.
     * @param {HTMLElement} btn - The submit button
     */
    function handleExactScoreSubmit(btn) {
      const matchId = btn.dataset.matchId;
      const section = btn.closest('.bet-section');

      const inputA = section.querySelector(`#scoreA-${matchId}`);
      const inputB = section.querySelector(`#scoreB-${matchId}`);

      const rawA = inputA ? inputA.value.trim() : '';
      const rawB = inputB ? inputB.value.trim() : '';

      if (rawA === '' || rawB === '') {
        showToast('Entrez les deux scores avant de valider.', 'error');
        return;
      }

      const scoreA = parseInt(rawA, 10);
      const scoreB = parseInt(rawB, 10);

      if (isNaN(scoreA) || isNaN(scoreB) || scoreA < 0 || scoreB < 0) {
        showToast('Les scores doivent être des nombres positifs.', 'error');
        return;
      }

      const existingBet = getUserBet(currentUser.id, matchId);
      const carryEtPrediction = existingBet ? existingBet.etPrediction : null;
      const result = placeBet(currentUser.id, matchId, null, scoreA, scoreB, carryEtPrediction);
      if (!result.success) {
        showToast(result.error, 'error');
        return;
      }

      allBets = getBets();
      showToast('Score exact enregistré ! ⚽', 'success');
      renderMatches();
    }

    /**
     * Handle a click on the prolongations bonus picker (only shown when the
     * current bet predicts a draw on a knockout-stage match).
     * @param {HTMLElement} btn - The clicked bonus button
     */
    function handleEtPredictionClick(btn) {
      const matchId = btn.dataset.matchId;
      const etPrediction = btn.dataset.etPrediction;

      const existingBet = getUserBet(currentUser.id, matchId);
      if (!existingBet) return;

      // Click the already-selected option again to clear the bonus pick
      const newEtPrediction = existingBet.etPrediction === etPrediction ? null : etPrediction;

      let result;
      if (existingBet.betType === 'exact') {
        result = placeBet(currentUser.id, matchId, null, existingBet.scoreA, existingBet.scoreB, newEtPrediction);
      } else {
        result = placeBet(currentUser.id, matchId, existingBet.prediction, null, null, newEtPrediction);
      }

      if (!result.success) {
        showToast(result.error, 'error');
        return;
      }

      allBets = getBets();
      showToast(newEtPrediction ? 'Bonus prolongations enregistré ! 🎁' : 'Bonus annulé', newEtPrediction ? 'success' : 'info');
      renderMatches();
    }

    /**
     * Handle a bet button click (simple bet).
     * @param {HTMLElement} btn - The clicked bet button
     */
    function handleBetClick(btn) {
      const matchId = btn.dataset.matchId;
      const prediction = btn.dataset.prediction;

      // If the user clicks the already-selected button (simple bet), deselect it
      const existingBet = getUserBet(currentUser.id, matchId);
      if (existingBet && existingBet.betType !== 'exact' && existingBet.prediction === prediction) {
        const result = removeBet(currentUser.id, matchId);
        if (!result.success) {
          showToast(result.error, 'error');
          return;
        }
        allBets = getBets();
        showToast('Pari annulé 🗑️', 'info');
        renderMatches();
        return;
      }

      const result = placeBet(currentUser.id, matchId, prediction);
      if (!result.success) {
        showToast(result.error, 'error');
        return;
      }

      // Update allBets reference
      allBets = getBets();

      showToast('Pari sauvegardé ! 🎯', 'success');
      renderMatches();
    }

    initBetsPage();
  </script>
</body>
</html>
